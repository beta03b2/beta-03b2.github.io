<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>MCBE ダメージ逆算ツール</title>
    <meta name="description" content="Minecraft 統合版のダメージシミュレーター。与えたいダメージから最適な攻撃エフェクト（Strength/Weakness）の組み合わせを瞬時に計算します。">
    <meta name="keywords" content="Minecraft, BE, マイクラ, ダメージ計算, 逆算, エフェクト, 最適化">

    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <meta property="og:type" content="website">
    <meta property="og:title" content="MCBE ダメージ逆算ツール">
    <meta property="og:description" content="基礎攻撃力と与えたいダメージから攻撃力上昇と弱体化の最適な組み合わせを逆算。">
    <meta property="og:image" content="og-image.png">
    <meta property="og:site_name" content="MCBE ダメージ逆算ツール">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@beta03B2">
    <meta name="twitter:title" content="MCBE ダメージ逆算ツール">
    <meta name="twitter:description" content="基礎攻撃力と与えたいダメージから攻撃力上昇と弱体化の最適な組み合わせを逆算。">
    <meta name="twitter:image" content="og-image.png">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1 id="ui-title">MCBE ダメージ逆算ツール</h1>

    <div class="input-card">
        <div class="field">
            <label id="ui-label-base">基礎攻撃力 (Base Attack)</label>
            <input type="number" id="baseAtk" value="1" step="any">
        </div>
        <div class="field">
            <label id="ui-label-target">目標ダメージ (Target Damage)</label>
            <input type="number" id="targetDmg" value="1" step="any">
        </div>

        <div class="field">
            <label class="checkbox-field">
                <input type="checkbox" id="isCritical"> <span id="ui-label-crit">クリティカルヒット (x1.5)</span>
            </label>
        </div>

        <div id="error-msg" class="error-display"></div>
    </div>

    <button id="calcBtn">最適な組み合わせを計算</button>
    <div id="status" class="status"></div>

    <div id="resultGrid" class="result-grid">
        <div class="result-card best">
            <span class="card-title" id="ui-p1-title">【1】目標に最も近い数値</span>
            <span id="p1_val" class="res-val">0</span>
            <div id="p1_err" class="error-text"></div>
            <div class="details">
                Strength Lv: <b id="p1_str">-</b><br>
                Weakness Lv: <b id="p1_wk">-</b>
            </div>
        </div>

        <div class="result-card over">
            <span class="card-title" id="ui-p2-title">【2】目標以上で最も近い数値</span>
            <span id="p2_val" class="res-val">0</span>
            <div id="p2_err" class="error-text"></div>
            <div class="details">
                Strength Lv: <b id="p2_str">-</b><br>
                Weakness Lv: <b id="p2_wk">-</b>
            </div>
        </div>
    </div>

    <div class="formula-info">
        <b id="ui-order-label">計算順序:</b> <span id="ui-order-val">基礎 → Strength → Weakness → Critical</span>
        <p id="ui-mob-notice" style="margin-top: 8px; font-style: italic; opacity: 0.8;"></p>
    </div>

    <footer class="footer">
        <span id="ui-footer-text">このサイトは</span><a href="https://x.com/beta03B2" target="_blank" rel="noopener noreferrer">@beta03B2</a><span id="ui-footer-gemini">及び、Google Geminiによって作成されました。</span>
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
